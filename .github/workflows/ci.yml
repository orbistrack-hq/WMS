name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-tests:
    name: Database (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Start local database (applies migrations + seed)
        run: supabase db start

      - name: Run pgTAP test suite
        run: supabase test db

      - name: Stop database
        if: always()
        run: supabase stop --no-backup

  deploy-migrations:
    name: Deploy migrations to production
    needs: db-tests
    # Only on a real merge to main — never on PRs, and only if the tests passed.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Link to the production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply pending migrations to production
        run: supabase db push
