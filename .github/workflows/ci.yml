name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-tests:
    name: Database (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Start local database (applies migrations + seed)
        run: supabase db start

      - name: Run pgTAP test suite
        run: supabase test db

      - name: Stop database
        if: always()
        run: supabase stop --no-backup

  unit-tests:
    name: Lint, types & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run Vitest
        run: pnpm test

  migration-roundtrip:
    name: Migration round-trip (reversibility)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify every migration reverses cleanly
        env:
          ROUNDTRIP_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: python3 supabase/tests/roundtrip/roundtrip.py

  deploy-migrations:
    name: Deploy migrations to production
    needs: [db-tests, unit-tests, migration-roundtrip]
    # Only on a real merge to main — never on PRs, and only if the tests passed.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Link to the production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply pending migrations to production
        run: supabase db push
